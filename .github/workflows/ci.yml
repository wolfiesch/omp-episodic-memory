name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run check
      - name: Test
        run: bun run test
      - name: Benchmark gate (OMP-MemBench)
        run: bun run cli -- bench --questions test/fixtures/eval/questions.jsonl --sessions test/fixtures/sessions --labels test/fixtures/extract-eval/labels.jsonl --mode text
